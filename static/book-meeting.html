<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book a Meeting — Greg Iteen</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--black:#0a0a0a;--white:#f5f5f3;--gray:rgba(245,245,243,.55);--line:rgba(245,245,243,.28);--accent:#ff6a00}
html,body{min-height:100%}
body{font-family:'Archivo',sans-serif;background:var(--black);color:var(--white);display:flex;flex-direction:column;min-height:100dvh;padding:clamp(20px,4vw,56px)}
.top{font-family:'IBM Plex Mono',monospace;font-size:.68rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gray);margin-bottom:clamp(32px,6vw,72px)}
main{flex:1;display:flex;flex-direction:column;max-width:640px;margin:0 auto;width:100%}
img.logo{height:32px;width:auto;align-self:flex-start;margin-bottom:clamp(24px,5vw,48px)}
h1{font-family:'Archivo Black',sans-serif;font-size:clamp(1.6rem,4vw,2.6rem);line-height:1.15;margin-bottom:24px}
main p{color:var(--gray);font-size:1rem;line-height:1.6;margin-bottom:20px}
.field{margin-bottom:20px;}
.field label{display:block;font-family:'IBM Plex Mono',monospace;font-size:.8rem;color:var(--gray);margin-bottom:8px;text-transform:uppercase;}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--line);color:var(--white);font-family:'Archivo',sans-serif;font-size:1rem;padding:12px 16px;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-bottom:24px;}
.slot{background:rgba(255,255,255,0.05);border:1px solid var(--line);color:var(--white);text-align:center;padding:12px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:.85rem;transition:all .2s;}
.slot:hover{border-color:var(--white);}
.slot.selected{background:var(--white);color:var(--black);border-color:var(--white);}
.slot.busy{opacity:0.3;pointer-events:none;}
.cta{display:inline-block;background:var(--accent);color:var(--white);font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:.85rem;letter-spacing:.05em;border:none;cursor:pointer;text-decoration:none;padding:16px 28px;margin:8px 0 20px;transition:opacity .2s}
.cta:hover{opacity:.85}
.cta:disabled{opacity:0.5;cursor:not-allowed;}
.fine{font-size:.8rem;color:var(--gray)}
footer{font-family:'IBM Plex Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--gray);border-top:1px solid var(--line);padding-top:20px;margin-top:clamp(32px,6vw,72px)}
footer a{color:var(--gray);text-decoration:none}
footer a:hover{color:var(--white)}
</style>
</head>
<body>
<div class="top">Greg Iteen — Meeting</div>
<main>
<img class="logo" src="/gi-logo-transparent-dark.png" alt="Greg Iteen">
<h1>Schedule a call</h1>
<p>Select an available time below to schedule a meeting. I'll send a Google Meet link upon confirmation.</p>

<div id="loading">Loading availability...</div>

<div id="bookingForm" style="display:none;">
  <div class="field">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" placeholder="Jane Doe" required>
  </div>
  <div class="field">
    <label for="email">Your Email</label>
    <input type="email" id="email" name="email" placeholder="jane@example.com" required>
  </div>
  <div class="field">
    <label>Available Slots (Next 14 Days)</label>
    <div class="slot-grid" id="slots"></div>
  </div>
  <button id="submitBtn" class="cta" disabled onclick="bookMeeting()">Confirm Booking</button>
</div>

<div id="successMessage" style="display:none;">
  <h3>Meeting Requested! 🎉</h3>
  <p>I have received your request and will follow up shortly with a calendar invite and video link.</p>
</div>

</main>
<footer><a href="https://gregiteen.xyz">gregiteen.xyz</a></footer>

<script>
let selectedSlot = null;

async function loadAvailability() {
  try {
    const res = await fetch('/api/calendar/availability');
    const data = await res.json();
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('bookingForm').style.display = 'block';
    
    const slotsEl = document.getElementById('slots');
    slotsEl.innerHTML = '';
    
    data.slots.forEach(slot => {
      // Very basic collision check against busy times (exact day match for simplicity)
      const slotDate = new Date(slot).toISOString().split('T')[0];
      const isBusy = data.busy.some(b => b.startsWith(slotDate));
      
      const el = document.createElement('button');
      el.type = 'button';
      el.className = 'slot' + (isBusy ? ' busy' : '');
      el.textContent = new Date(slot).toLocaleDateString(undefined, { weekday: 'short', month: 'short', day: 'numeric' });
      el.setAttribute('aria-pressed', 'false');
      
      if (!isBusy) {
        el.onclick = () => {
          document.querySelectorAll('.slot').forEach(s => {
            s.classList.remove('selected');
            s.setAttribute('aria-pressed', 'false');
          });
          el.classList.add('selected');
          el.setAttribute('aria-pressed', 'true');
          selectedSlot = slot;
          document.getElementById('submitBtn').disabled = false;
        };
      } else {
        el.disabled = true;
        el.setAttribute('aria-disabled', 'true');
      }
      
      slotsEl.appendChild(el);
    });
  } catch (e) {
    document.getElementById('loading').textContent = 'Failed to load availability.';
  }
}

async function bookMeeting() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  
  if (!name || !email || !selectedSlot) return alert("Please fill out your details and select a slot.");
  
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('submitBtn').textContent = 'Booking...';
  
  try {
    const res = await fetch('/api/calendar/book', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, slot: selectedSlot })
    });
    const data = await res.json();
    if (data.success) {
      document.getElementById('bookingForm').style.display = 'none';
      document.getElementById('successMessage').style.display = 'block';
    } else {
      throw new Error(data.error);
    }
  } catch (e) {
    alert("Booking failed: " + e.message);
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Confirm Booking';
  }
}

loadAvailability();
</script>
</body>
</html>
