<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Set New Webmail Password</title>
  <style>
    :root { --bg: #0a0a0a; --surface: #111; --line: #2a2a2a; --white: #f5f5f3; --gray: #888; --red: #e22b22; --green: #22c55e;}
    body { font-family: sans-serif; background: var(--bg); color: var(--white); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { background: var(--surface); padding: 30px; border: 1px solid var(--line); border-radius: 8px; width: 100%; max-width: 400px; text-align: center; }
    input { width: 100%; padding: 12px; margin: 12px 0; background: var(--bg); border: 1px solid var(--line); color: var(--white); box-sizing: border-box; }
    button { width: 100%; padding: 12px; background: var(--white); color: var(--bg); font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
    button:hover { background: #ddd; }
    .msg { margin-top: 15px; font-size: 0.9em; color: var(--gray); }
  </style>
</head>
<body>
  <div class="box">
    <h2>Set New Webmail Password</h2>
    <p class="msg">This link resets the administrator webmail account only.</p>
    <form id="resetForm">
      <label for="password" style="display:block;text-align:left">New password</label>
      <input type="password" id="password" name="password" placeholder="New Password" required minlength="8" autocomplete="new-password">
      <button type="submit" id="resetButton">Update Password</button>
    </form>
    <div id="msg" class="msg"></div>
  </div>
  <script>
    document.getElementById('resetForm').addEventListener('submit', resetPassword);
    async function resetPassword(event) {
      event.preventDefault();
      const password = document.getElementById('password').value;
      if (!password || password.length < 8) {
        document.getElementById('msg').innerHTML = `<span style="color:var(--red)">Password must be at least 8 characters.</span>`;
        return;
      }
      const token = new URLSearchParams(window.location.search).get('token');
      if (!token) {
        document.getElementById('msg').innerHTML = `<span style="color:var(--red)">Invalid or missing token.</span>`;
        return;
      }
      
      const button = document.getElementById('resetButton');
      button.disabled = true;
      document.getElementById('msg').textContent = 'Updating secure webmail credentials…';
      try {
        const res = await fetch('/api/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (res.ok) {
          history.replaceState({}, document.title, '/reset.html');
          document.getElementById('msg').innerHTML = `<span style="color:var(--green)">Password updated successfully! You can now log in to the webmail.</span>`;
        } else {
          document.getElementById('msg').innerHTML = `<span style="color:var(--red)">${data.error || 'Failed to update'}</span>`;
        }
      } catch(e) {
        document.getElementById('msg').innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
      } finally {
        button.disabled = false;
      }
    }
  </script>
</body>
</html>
