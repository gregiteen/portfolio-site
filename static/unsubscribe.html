<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Unsubscribed — Greg Iteen</title>
<link rel="icon" type="image/png" href="/assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--white:#f5f5f3;--gray:rgba(245,245,243,.55);
  --faint:rgba(245,245,243,.22);--line:rgba(245,245,243,.28);
  --accent:#ff6a00;
}
html,body{min-height:100%}
body{
  font-family:'Archivo',sans-serif;background:var(--black);color:var(--white);
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;padding:clamp(20px,4vw,56px);
}
.frame{
  max-width:500px;width:100%;
}
.logo { height:24px;width:auto;margin-bottom:32px;display:inline-block; }
h1{
  font-family:'Archivo Black',sans-serif;font-size:clamp(1.5rem,4vw,3rem);
  line-height:1.1;letter-spacing:-.02em;text-transform:uppercase;margin-bottom:16px;
}
.lede{
  font-size:clamp(.9rem,1.2vw,1.1rem);line-height:1.65;color:var(--gray);
  margin-bottom:32px;
}
.btn {
  display:inline-block;padding:14px 28px;border:1px solid var(--white);
  font-family:'Archivo Black',sans-serif;font-size:.8rem;letter-spacing:.14em;
  text-transform:uppercase;text-decoration:none;background:var(--white);color:var(--black);
  transition:background .2s,color .2s;
}
.btn:hover { background:transparent;color:var(--white); }
</style>
</head>
<body>
<div class="frame" id="content">
  <img class="logo" src="/gi-logo-transparent-dark.png" alt="greg.iteen">
  <h1 id="title">Loading...</h1>
  <p class="lede" id="msg">Processing your request.</p>
  <a href="/" class="btn">Return to Portfolio</a>
</div>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const title = document.getElementById('title');
  const msg = document.getElementById('msg');
  
  if (urlParams.has('success')) {
    title.textContent = "Unsubscribed";
    msg.textContent = "You have been successfully removed from our mailing list. You won't receive any further automated follow-ups.";
  } else if (urlParams.has('error')) {
    title.textContent = "Invalid Link";
    msg.textContent = "This unsubscribe link is invalid or has expired. If you're still receiving emails, please reply directly and let us know.";
  } else {
    title.textContent = "Unsubscribed";
    msg.textContent = "You have been unsubscribed.";
  }
</script>
</body>
</html>
